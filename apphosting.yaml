# Firebase App Hosting config for review-app (ReviewSnap).
# NEXT_PUBLIC_* are baked into the client bundle at BUILD time and are not secret.
# No server-only secrets needed: the customer link reads jobs via public Firestore
# rules, and the console writes as an authenticated user — all client-side.
runConfig:
  minInstances: 0
  maxInstances: 2

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBOgMoF_8HFsnTJzD6CCWl6ageYgcq5bPw
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: review-snap-4d006.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: review-snap-4d006
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: review-snap-4d006.firebasestorage.app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "1001908953060"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:1001908953060:web:5d73cefab9ad0765aa31f1
    availability: [BUILD, RUNTIME]
