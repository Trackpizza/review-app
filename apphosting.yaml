# Firebase App Hosting config for review-app (ReviewSnap).
# Fill the PLACEHOLDER values after creating the Firebase project.
# NEXT_PUBLIC_* are baked into the client bundle at BUILD time.
runConfig:
  minInstances: 0
  maxInstances: 2

env:
  # --- Public Firebase web config (safe to commit) ---
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: PLACEHOLDER
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: PLACEHOLDER.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: PLACEHOLDER
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: PLACEHOLDER.firebasestorage.app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "PLACEHOLDER"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: PLACEHOLDER
    availability: [BUILD, RUNTIME]

  # --- Server-only admin credentials (pass 2) ---
  - variable: FIREBASE_PROJECT_ID
    value: PLACEHOLDER
    availability: [RUNTIME]
  - variable: FIREBASE_CLIENT_EMAIL
    value: firebase-adminsdk-PLACEHOLDER@PLACEHOLDER.iam.gserviceaccount.com
    availability: [RUNTIME]
  - variable: FIREBASE_PRIVATE_KEY
    secret: firebase-private-key
    availability: [RUNTIME]
